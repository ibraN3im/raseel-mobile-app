  <title>Car Rental</title>
</head>

<body>
  <div id="root">
    <!-- Static loading screen shown before React mounts -->
    <style>
      #initial-loader {
        position: fixed;
        inset: 0;
        z-index: 99999;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #b5ecff38;
      }

      #initial-loader img {
        width: 100px;
        height: 100px;
        object-fit: contain;
        animation: logo-pulse 1.5s ease-in-out infinite;
      }

      @keyframes logo-pulse {

        0%,
        100% {
          opacity: 1;
          transform: scale(1);
        }

        50% {
          opacity: 0.6;
          transform: scale(0.92);
        }
      }
    </style>
    <div id="initial-loader">
      <img
        src="https://res.cloudinary.com/dxuxjz0tx/image/upload/v1781095847/3A644144-D82C-4CFE-B8DD-4DD819D4382C_pbuetu.png"
        alt="Loading..." />
    </div>
  </div>
  <script type="module">
    // Remove initial loader once React mounts
    const root = document.getElementById('root');
    const observer = new MutationObserver(() => {
      const loader = document.getElementById('initial-loader');
      if (loader && root.children.length > 1) loader.remove();
      observer.disconnect();
    });
    observer.observe(root, { childList: true });
  </script>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
